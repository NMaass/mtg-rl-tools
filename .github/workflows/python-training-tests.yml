name: python-training-tests

on:
  pull_request:
    paths:
      - "python/magic_cabt/models/**"
      - "python/magic_cabt/training/**"
      - "python/tests/test_structured_jepa.py"
      - "python/tests/test_train_jepa_reliable.py"
      - "python/pyproject.toml"
      - ".github/workflows/python-training-tests.yml"
  push:
    branches: [main]
    paths:
      - "python/magic_cabt/models/**"
      - "python/magic_cabt/training/**"
      - "python/tests/test_structured_jepa.py"
      - "python/tests/test_train_jepa_reliable.py"
      - "python/pyproject.toml"

jobs:
  torch-cpu-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - name: Install CPU PyTorch package
        working-directory: python
        run: python -m pip install -e ".[jepa]"
      - name: Run structured-model and training smoke tests
        working-directory: python
        run: >-
          python -m unittest -v
          tests.test_structured_jepa
          tests.test_train_jepa_reliable
