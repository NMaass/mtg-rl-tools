name: python-mirror-tests

# Python-only gate for the arena_mirror layer (follower, tracker, options,
# recorder, replay, hidden-info sanitization, launcher wiring). These tests
# need no JVM and no MTGA captures — the end-to-end tests that require real
# Player.log captures skip themselves when the captures are absent.

on:
  pull_request:
    paths:
      - "python/**"
      - ".github/workflows/python-mirror-tests.yml"
  push:
    branches: [main]
    paths:
      - "python/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package in editable mode
        working-directory: python
        run: python -m pip install --quiet -e .
      - name: Run mirror + package unit tests
        id: package-tests
        continue-on-error: true
        working-directory: python
        run: python -m unittest discover -s tests -v > test-output-${{ matrix.python-version }}.txt 2>&1
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-output-${{ matrix.python-version }}
          path: python/test-output-${{ matrix.python-version }}.txt
      - name: Fail when tests failed
        if: steps.package-tests.outcome == 'failure'
        working-directory: python
        run: |
          tail -n 200 test-output-${{ matrix.python-version }}.txt
          exit 1
