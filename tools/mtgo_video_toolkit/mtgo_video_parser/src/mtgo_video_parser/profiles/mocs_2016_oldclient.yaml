name: mocs-2016-oldclient
metadata:
  description: >-
    Calibrated layout for the 2016 Magic Online Championship Series broadcast
    (old MTGO client, 1920x1080). Player panels — avatar, life total, timer,
    library/hand pill counts — sit in the LEFT sidebar (opponent on top, local
    on the bottom), the scrolling game log is the left text box, and the turn
    indicator runs along the bottom bar. This differs fundamentally from the
    modern-client `mtgo-1080p-standard` profile (which puts life on the right).
    Calibrated against youtube FeNbwi7-lT0 (WotC official channel).
  reference_resolution: [1920, 1080]
  notes: >-
    The active phase in this client is indicated by a colour highlight on a
    fixed step bar (Untap..Cleanup), not by which words are present, so it is
    intentionally NOT modelled as a text region here — text OCR of the bar
    would return every step name every frame. A colour-highlight detector is a
    future enhancement. Battlefield card *names* require a card-DB resolver
    (--card-db); without one these zones yield card counts only.
regions:
  # --- Opponent (top-left panel) ---
  opponent_life:
    x: 0.008
    y: 0.088
    width: 0.072
    height: 0.069
    kind: integer
    config: {scale: 3.0, grayscale: true}
  opponent_hand_count:
    x: 0.057
    y: 0.024
    width: 0.021
    height: 0.028
    kind: integer
    config: {scale: 4.0, grayscale: true}
  # --- Local (bottom-left panel) ---
  local_life:
    x: 0.008
    y: 0.628
    width: 0.072
    height: 0.072
    kind: integer
    config: {scale: 3.0, grayscale: true}
  local_hand_count:
    x: 0.057
    y: 0.563
    width: 0.021
    height: 0.028
    kind: integer
    config: {scale: 4.0, grayscale: true}
  # --- Turn indicator (bottom bar, far left) ---
  turn_number:
    x: 0.079
    y: 0.909
    width: 0.062
    height: 0.021
    kind: integer
    config: {scale: 3.0, grayscale: true}
  # --- Phase step bar (bottom): active step is a colour highlight, not text.
  # `centers` are x-fractions within this region, derived by clustering the
  # orange-highlight centroid across the clip. Two "Main" steps disambiguate
  # by position (MAIN1 precombat, MAIN2 postcombat). ---
  phase:
    x: 0.078
    y: 0.905
    width: 0.917
    height: 0.025
    kind: phase_bar
    config:
      steps: [UNTAP, UPKEEP, DRAW, MAIN1, BEGIN_COMBAT, ATTACKERS, BLOCKERS, DAMAGE, END_COMBAT, MAIN2, END, CLEANUP]
      centers: [0.105, 0.185, 0.255, 0.329, 0.414, 0.497, 0.571, 0.656, 0.782, 0.844, 0.919, 0.985]
      min_center: 0.07
      hsv_low: [8, 80, 120]
      hsv_high: [28, 255, 255]
  # --- Scrolling game log (left text box) ---
  game_log:
    x: 0.004
    y: 0.410
    width: 0.074
    height: 0.145
    kind: log
    config: {scale: 2.0, grayscale: true}
  # --- Battlefields (centre panels; counts only without a card DB) ---
  opponent_battlefield:
    x: 0.078
    y: 0.028
    width: 0.900
    height: 0.430
    kind: card_zone
    config: {zone: battlefield, controller: '2', recognize_names: true, empty_confidence: 0.25}
  local_battlefield:
    x: 0.078
    y: 0.468
    width: 0.900
    height: 0.433
    kind: card_zone
    config: {zone: battlefield, controller: '1', recognize_names: true, empty_confidence: 0.25}
